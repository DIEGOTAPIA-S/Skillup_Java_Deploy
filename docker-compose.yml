services:
  db:
    image: mysql:8.0
    container_name: skillup-db
    restart: always
    environment:
      MYSQL_DATABASE: skillup_db
      MYSQL_ROOT_PASSWORD: rootpassword
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - skillup-network

  app:
    build: .
    container_name: skillup-app
    restart: always
    ports:
      - "8081:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/skillup_db?createDatabaseIfNotExist=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: rootpassword
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    depends_on:
      - db
    networks:
      - skillup-network

networks:
  skillup-network:
    driver: bridge

volumes:
  mysql_data:

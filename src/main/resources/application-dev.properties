# Configuración para Desarrollo Local (MySQL)
spring.application.name=skillup-local

# Usar MySQL local
spring.datasource.url=jdbc:mysql://localhost:3306/skillup?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=skillup2026*
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# H2 Console (deshabilitada ya que usamos MySQL)
spring.h2.console.enabled=false

# Mostrar SQL en consola
logging.level.org.hibernate.SQL=DEBUG

# Deshabilitar caché para ver cambios al instante
spring.thymeleaf.cache=false
spring.web.resources.cache.period=0

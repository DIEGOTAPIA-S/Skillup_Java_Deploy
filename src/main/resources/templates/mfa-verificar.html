<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Verificar Código | SkillUp</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center py-10">
    <div class="w-full max-w-md bg-white p-8 rounded-3xl shadow-2xl border border-purple-200 text-center">
        <h2 class="text-2xl font-extrabold text-purple-700 mb-2">Verificación en dos pasos</h2>
        <p class="text-gray-600 mb-6 text-sm">Ingresa el código de 6 dígitos que aparece en tu aplicación.</p>

        <div th:if="${error}" class="mb-4 p-3 rounded bg-red-100 text-red-700 border border-red-300 text-sm">
            <span th:text="${error}"></span>
        </div>

        <form th:action="@{/mfa/validar}" method="post" class="space-y-6">
            <input type="text" name="codigo" required maxlength="6" autofocus
                   placeholder="000000"
                   class="w-full text-center text-3xl tracking-[1rem] font-bold border border-gray-300 p-4 rounded-xl focus:outline-none focus:ring-2 focus:ring-purple-500 bg-gray-50"/>
            
            <button type="submit" 
                    class="w-full bg-purple-600 hover:bg-purple-700 text-white font-bold py-3 rounded-lg shadow transition">
                Verificar y Entrar
            </button>
        </form>

        <p class="mt-6 text-xs text-gray-500">
            ¿Perdiste el acceso? Contacta al administrador.
        </p>
    </div>
</body>
</html>

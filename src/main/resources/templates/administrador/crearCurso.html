<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Crear Curso - SKILLUP</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="flex flex-col min-h-screen bg-gradient-to-br from-blue-100 via-white to-purple-50">

<!-- Header -->
<div th:replace="layouts/headerAdministrador :: header"></div>

<!-- Contenido principal -->
<main class="flex-grow py-10">
    <div class="max-w-6xl w-full mx-auto px-4">

        <!-- Botón Volver -->
        <div class="mb-6">
            <a th:href="@{/administrador/seleccionar}"
               class="inline-flex items-center text-purple-700 hover:text-purple-900 font-medium transition">
                <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
                </svg>
                Volver
            </a>
        </div>

        <div class="bg-white rounded-2xl shadow-2xl border border-purple-200 p-10">
            <h1 class="text-4xl font-extrabold text-purple-700 mb-2">
                Crear Nuevo Curso
            </h1>
            <p class="text-gray-600 mb-8">
                Completa la información para crear un curso de habilidades blandas
            </p>

            <!-- Formulario -->
            <form id="formCurso">

                <!-- 1. PANEL TÍTULO -->
                <div class="mb-8 p-6 bg-purple-50 rounded-xl border-2 border-purple-200">
                    <h2 class="text-2xl font-bold text-purple-800 mb-4 flex items-center">
                        <span class="text-3xl mr-3">📝</span>
                        Información del Curso
                    </h2>

                    <div>
                        <label for="nombre" class="block text-sm font-semibold text-gray-700 mb-2">
                            Título del Curso <span class="text-red-500">*</span>
                        </label>
                        <input type="text"
                               id="nombre"
                               name="nombre"
                               placeholder="Ej: Negociación Efectiva"
                               class="w-full px-4 py-3 border-2 border-purple-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-purple-500 focus:border-transparent transition">
                    </div>
                </div>

                <!-- 2. PANEL IMAGEN -->
                <div class="mb-8 p-6 bg-blue-50 rounded-xl border-2 border-blue-200">
                    <h2 class="text-2xl font-bold text-blue-800 mb-4 flex items-center">
                        <span class="text-3xl mr-3">🖼️</span>
                        Imagen del Curso
                    </h2>

                    <div class="flex flex-col md:flex-row items-start gap-6">
                        <div class="flex-1 w-full">
                            <label for="imagenUrl" class="block text-sm font-semibold text-gray-700 mb-2">
                                URL de la Imagen
                            </label>
                            <input type="text"
                                   id="imagenUrl"
                                   name="imagenUrl"
                                   placeholder="https://ejemplo.com/imagen.jpg"
                                   class="w-full px-4 py-3 border-2 border-blue-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition">
                            <p class="mt-2 text-xs text-gray-500">
                                Proporciona una URL de imagen para el curso (opcional)
                            </p>
                        </div>

                        <div id="preview" class="w-48 h-32 bg-gray-100 border-2 border-dashed border-gray-300 rounded-xl flex items-center justify-center overflow-hidden">
                            <span class="text-gray-400 text-sm text-center px-2">Vista previa</span>
                        </div>
                    </div>
                </div>

                <!-- 3. PANEL MÓDULOS Y CONTENIDOS -->
                <div class="mb-8 p-6 bg-green-50 rounded-xl border-2 border-green-200">
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="text-2xl font-bold text-green-800 flex items-center">
                            <span class="text-3xl mr-3">📚</span>
                            Módulos del Curso
                        </h2>
                        <button type="button"
                                id="btnAgregarModulo"
                                class="bg-green-600 hover:bg-green-700 text-white font-semibold py-2 px-4 rounded-lg transition">
                            + Agregar Módulo
                        </button>
                    </div>

                    <div id="modulosContainer" class="space-y-4">
                        <!-- Los módulos se agregarán aquí dinámicamente -->
                    </div>
                </div>

                <!-- Botones de acción -->
                <div class="flex flex-col md:flex-row gap-4 pt-6 border-t border-gray-200">
                    <button type="button"
                            id="btnGuardar"
                            class="flex-1 bg-purple-700 hover:bg-purple-800 text-white text-lg font-semibold py-3 px-6 rounded-xl shadow-lg transition transform hover:scale-105">
                        💾 Guardar Curso
                    </button>
                    <a th:href="@{/administrador/seleccionar}"
                       class="flex-1 bg-gray-200 hover:bg-gray-300 text-gray-700 text-lg font-semibold py-3 px-6 rounded-xl shadow transition transform hover:scale-105 text-center flex items-center justify-center">
                        Cancelar
                    </a>
                </div>

            </form>
        </div>
    </div>
</main>

<!-- Footer -->
<div th:replace="layouts/footer :: footer"></div>

<script>
    // Variables globales
    var moduloCount = 0;

    // Vista previa de imagen
    var inputImagen = document.getElementById('imagenUrl');
    if (inputImagen) {
        inputImagen.addEventListener('input', function() {
            var preview = document.getElementById('preview');
            var url = this.value;

            if (url && url.trim() !== '') {
                var img = document.createElement('img');
                img.src = url;
                img.className = 'w-full h-full object-cover rounded-xl';
                img.onerror = function() {
                    preview.innerHTML = '<span class="text-gray-400 text-sm text-center px-2">Imagen no válida</span>';
                };
                preview.innerHTML = '';
                preview.appendChild(img);
            } else {
                preview.innerHTML = '<span class="text-gray-400 text-sm text-center px-2">Vista previa</span>';
            }
        });
    }

    // Función para agregar módulo
    function agregarModulo() {
        moduloCount = moduloCount + 1;
        var container = document.getElementById('modulosContainer');

        var moduloDiv = document.createElement('div');
        moduloDiv.className = 'border-2 border-green-300 rounded-xl p-5 bg-white shadow-sm';
        moduloDiv.id = 'modulo-' + moduloCount;
        moduloDiv.setAttribute('data-modulo-id', moduloCount);

        var html = '<div class="flex justify-between items-center mb-4">';
        html += '<h3 class="text-xl font-bold text-green-700">▼ MÓDULO ' + moduloCount + '</h3>';
        html += '<button type="button" class="btn-eliminar-modulo text-red-500 hover:text-red-700 font-semibold transition" data-modulo-id="' + moduloCount + '">✕ Eliminar</button>';
        html += '</div>';

        html += '<div class="mb-4">';
        html += '<label class="block text-sm font-semibold text-gray-700 mb-2">Nombre del Módulo <span class="text-red-500">*</span></label>';
        html += '<input type="text" name="modulo-nombre-' + moduloCount + '" placeholder="Ej: Fundamentos de la Negociación" class="w-full px-4 py-2 border-2 border-green-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500 transition">';
        html += '</div>';

        html += '<div class="mb-4">';
        html += '<div class="flex justify-between items-center mb-2">';
        html += '<label class="block text-sm font-semibold text-gray-700">Contenidos del Módulo</label>';
        html += '<button type="button" class="btn-agregar-contenido text-sm bg-blue-500 hover:bg-blue-600 text-white font-semibold py-1 px-3 rounded transition" data-modulo-id="' + moduloCount + '">+ Agregar Contenido</button>';
        html += '</div>';
        html += '<div id="contenidos-modulo-' + moduloCount + '" class="space-y-3"></div>';
        html += '</div>';

        moduloDiv.innerHTML = html;
        container.appendChild(moduloDiv);

        // Agregar event listeners
        var btnEliminar = moduloDiv.querySelector('.btn-eliminar-modulo');
        if (btnEliminar) {
            btnEliminar.addEventListener('click', function() {
                var moduloId = this.getAttribute('data-modulo-id');
                eliminarModulo(moduloId);
            });
        }

        var btnAgregarCont = moduloDiv.querySelector('.btn-agregar-contenido');
        if (btnAgregarCont) {
            btnAgregarCont.addEventListener('click', function() {
                var moduloId = this.getAttribute('data-modulo-id');
                agregarContenido(moduloId);
            });
        }
    }

    // Función para eliminar módulo
    function eliminarModulo(moduloId) {
        var modulo = document.getElementById('modulo-' + moduloId);
        if (modulo && confirm('¿Estás seguro de eliminar este módulo?')) {
            modulo.remove();
        }
    }

    // Función para agregar contenido
    function agregarContenido(moduloId) {
        var contenidosContainer = document.getElementById('contenidos-modulo-' + moduloId);
        if (!contenidosContainer) return;

        var contenidoCount = contenidosContainer.children.length + 1;

        var contenidoDiv = document.createElement('div');
        contenidoDiv.className = 'bg-blue-50 p-4 rounded-lg border border-blue-200';
        contenidoDiv.id = 'contenido-' + moduloId + '-' + contenidoCount;

        var html = '<div class="flex justify-between items-center mb-2">';
        html += '<h4 class="font-semibold text-blue-700">📄 Contenido ' + contenidoCount + '</h4>';
        html += '<button type="button" class="btn-eliminar-contenido text-red-500 hover:text-red-700 text-sm font-semibold transition" data-contenido-id="' + moduloId + '-' + contenidoCount + '">✕</button>';
        html += '</div>';

        html += '<div class="mb-2">';
        html += '<input type="text" name="contenido-titulo-' + moduloId + '-' + contenidoCount + '" placeholder="Título del contenido" class="w-full px-3 py-2 border border-blue-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">';
        html += '</div>';

        html += '<div>';
        html += '<textarea name="contenido-descripcion-' + moduloId + '-' + contenidoCount + '" placeholder="Descripción del contenido" rows="2" class="w-full px-3 py-2 border border-blue-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm resize-none"></textarea>';
        html += '</div>';

        contenidoDiv.innerHTML = html;
        contenidosContainer.appendChild(contenidoDiv);

        // Agregar event listener al botón eliminar
        var btnEliminarCont = contenidoDiv.querySelector('.btn-eliminar-contenido');
        if (btnEliminarCont) {
            btnEliminarCont.addEventListener('click', function() {
                var contenidoId = this.getAttribute('data-contenido-id');
                eliminarContenido(contenidoId);
            });
        }
    }

    // Función para eliminar contenido
    function eliminarContenido(contenidoId) {
        var contenido = document.getElementById('contenido-' + contenidoId);
        if (contenido && confirm('¿Estás seguro de eliminar este contenido?')) {
            contenido.remove();
        }
    }

    // Función para guardar curso
    function guardarCurso() {
        var titulo = document.getElementById('nombre').value;

        if (!titulo || titulo.trim() === '') {
            alert('⚠️ Por favor, ingresa el título del curso');
            return;
        }

        // Recopilar datos de módulos
        var modulos = [];
        var modulosElements = document.querySelectorAll('[id^="modulo-"]');

        modulosElements.forEach(function(moduloElement, index) {
            var moduloId = moduloElement.getAttribute('data-modulo-id');
            var nombreModuloInput = moduloElement.querySelector('input[name^="modulo-nombre-"]');

            if (nombreModuloInput && nombreModuloInput.value.trim() !== '') {
                var modulo = {
                    nombre: nombreModuloInput.value.trim(),
                    descripcion: '',
                    orden: index + 1,
                    contenidos: []
                };

                // Recopilar contenidos del módulo
                var contenidosContainer = document.getElementById('contenidos-modulo-' + moduloId);
                if (contenidosContainer) {
                    var contenidosElements = contenidosContainer.querySelectorAll('[id^="contenido-"]');

                    contenidosElements.forEach(function(contenidoElement, contenidoIndex) {
                        var tituloInput = contenidoElement.querySelector('input[name^="contenido-titulo-"]');
                        var descripcionTextarea = contenidoElement.querySelector('textarea[name^="contenido-descripcion-"]');

                        if (tituloInput && tituloInput.value.trim() !== '') {
                            modulo.contenidos.push({
                                titulo: tituloInput.value.trim(),
                                descripcion: descripcionTextarea ? descripcionTextarea.value.trim() : '',
                                orden: contenidoIndex + 1
                            });
                        }
                    });
                }

                modulos.push(modulo);
            }
        });

        // Preparar datos para enviar
        var data = {
            nombre: titulo,
            modulos: modulos
        };

        console.log('Datos a enviar:', data);

        // Enviar datos al servidor
        fetch('/cursos/guardar', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify(data)
        })
            .then(function(response) {
                return response.json();
            })
            .then(function(result) {
                if (result.success) {
                    alert('✅ ' + result.message);
                    window.location.href = '/administrador/seleccionar';
                } else {
                    alert('❌ ' + result.message);
                }
            })
            .catch(function(error) {
                console.error('Error:', error);
                alert('❌ Error al guardar el curso. Por favor, intenta de nuevo.');
            });
    }

    // Event listeners
    document.addEventListener('DOMContentLoaded', function() {
        // Botón agregar módulo
        var btnAgregarModulo = document.getElementById('btnAgregarModulo');
        if (btnAgregarModulo) {
            btnAgregarModulo.addEventListener('click', agregarModulo);
        }

        // Botón guardar
        var btnGuardar = document.getElementById('btnGuardar');
        if (btnGuardar) {
            btnGuardar.addEventListener('click', guardarCurso);
        }

        // Agregar un módulo por defecto
        agregarModulo();
    });
</script>

</body>
</html>

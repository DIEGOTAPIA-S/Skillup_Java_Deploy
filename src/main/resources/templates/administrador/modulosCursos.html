<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Módulos del Curso - SKILLUP</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">

<div th:replace="~{layouts/headerAdministrador :: header}"></div>

<main class="max-w-6xl mx-auto my-8 p-6">

    <!-- Botón Volver -->
    <div class="mb-6">
        <a th:href="@{/administrador/cursos/listar}"
           class="inline-flex items-center text-purple-700 hover:text-purple-900 font-medium transition">
            <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
            </svg>
            Volver a Cursos
        </a>
    </div>

    <!-- Header -->
    <div class="bg-white rounded-2xl shadow-lg border border-purple-200 p-8 mb-8">
        <div class="flex flex-col md:flex-row justify-between items-center gap-4">
            <div>
                <h1 class="text-4xl font-extrabold text-purple-700"
                    th:text="'Módulos: ' + ${curso.nombre}">
                </h1>
                <p class="text-gray-600 mt-2" th:text="${curso.descripcion}">
                </p>
            </div>
            <button onclick="mostrarModalModulo()"
                    class="bg-purple-700 hover:bg-purple-800 text-white px-6 py-3 rounded-xl font-bold shadow-lg transition transform hover:-translate-y-1">
                ➕ Nuevo Módulo
            </button>
        </div>
    </div>

    <!-- Mensaje si no hay módulos -->
    <div th:if="${modulos == null or modulos.isEmpty()}"
         class="bg-white rounded-2xl shadow-lg p-16 text-center border-2 border-dashed border-purple-200">
        <div class="text-7xl mb-4">📖</div>
        <h2 class="text-2xl font-bold text-gray-700 mb-2">Este curso aún no tiene módulos</h2>
        <p class="text-gray-500 mb-6">Comienza la estructura del curso agregando el primer módulo.</p>
        <button onclick="mostrarModalModulo()"
                class="bg-purple-100 text-purple-700 hover:bg-purple-200 px-6 py-3 rounded-xl font-bold transition">
            Crear Primer Módulo
        </button>
    </div>

    <!-- Lista de módulos -->
    <div th:if="${modulos != null and !modulos.isEmpty()}"
         class="grid grid-cols-1 gap-6">

        <div th:each="modulo : ${modulos}"
             class="bg-white rounded-2xl shadow-md border border-gray-100 p-6 hover:shadow-xl transition-all group">

            <div class="flex flex-col md:flex-row justify-between items-center gap-6">
                <div class="flex items-start gap-4 flex-1">
                    <div class="bg-purple-600 text-white w-12 h-12 rounded-2xl flex items-center justify-center font-bold text-xl shadow-lg"
                          th:text="${modulo.orden}">1</div>
                    <div>
                        <h3 class="text-2xl font-bold text-gray-800 group-hover:text-purple-700 transition"
                            th:text="${modulo.nombre}">
                        </h3>
                        <p class="text-gray-600 mt-1" th:text="${modulo.descripcion}">
                        </p>
                    </div>
                </div>

                <div class="flex flex-wrap justify-center gap-3">
                    <a th:href="@{/administrador/contenidos/modulo/{id}(id=${modulo.id})}"
                       class="bg-green-100 text-green-700 hover:bg-green-600 hover:text-white font-bold py-2.5 px-5 rounded-xl transition flex items-center gap-2">
                        📚 Contenidos
                    </a>
                    
                    <button th:attr="data-id=${modulo.id}, data-nombre=${modulo.nombre}, data-descripcion=${modulo.descripcion}, data-orden=${modulo.orden}"
                            onclick="editarModulo(this)"
                            class="bg-blue-100 text-blue-700 hover:bg-blue-600 hover:text-white font-bold py-2.5 px-5 rounded-xl transition">
                        ✏️ Editar
                    </button>

                    <button th:onclick="'eliminarModulo(' + ${modulo.id} + ')'"
                            class="bg-red-100 text-red-700 hover:bg-red-600 hover:text-white font-bold py-2.5 px-5 rounded-xl transition">
                        🗑️ Borrar
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- MODAL DE MÓDULO -->
    <div id="modalModulo" class="hidden fixed inset-0 bg-black/50 backdrop-blur-sm z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl shadow-2xl w-full max-w-lg overflow-hidden transform transition-all">
            <div class="bg-purple-700 p-6">
                <h3 id="modalTitulo" class="text-2xl font-bold text-white">Nuevo Módulo</h3>
            </div>
            
            <form id="formModulo" class="p-8 space-y-5">
                <input type="hidden" name="idCurso" th:value="${curso.id}">
                <input type="hidden" id="moduloIdInput" name="id">

                <div>
                    <label class="block font-bold text-gray-700 mb-2">Nombre del Módulo</label>
                    <input type="text" id="nombreInput" name="nombre" required
                           class="w-full px-4 py-3 rounded-xl border-2 border-gray-100 focus:border-purple-500 outline-none transition">
                </div>

                <div>
                    <label class="block font-bold text-gray-700 mb-2">Descripción Corta</label>
                    <textarea id="descripcionInput" name="descripcion" rows="3"
                              class="w-full px-4 py-3 rounded-xl border-2 border-gray-100 focus:border-purple-500 outline-none transition"></textarea>
                </div>

                <div class="w-32">
                    <label class="block font-bold text-gray-700 mb-2">Orden</label>
                    <input type="number" id="ordenInput" name="orden" min="1" value="1"
                           class="w-full px-4 py-3 rounded-xl border-2 border-gray-100 focus:border-purple-500 outline-none transition">
                </div>

                <div class="flex gap-4 mt-8">
                    <button type="submit" class="flex-1 bg-purple-700 hover:bg-purple-800 text-white font-bold py-3 rounded-xl shadow-lg transition">
                        Guardar Módulo
                    </button>
                    <button type="button" onclick="cerrarModalModulo()" class="flex-1 bg-gray-100 hover:bg-gray-200 text-gray-700 font-bold py-3 rounded-xl transition">
                        Cancelar
                    </button>
                </div>
            </form>
        </div>
    </div>

</main>

<script th:inline="javascript">
    let editMode = false;

    function mostrarModalModulo() {
        editMode = false;
        document.getElementById('modalModulo').classList.remove('hidden');
        document.getElementById('modalTitulo').textContent = 'Nuevo Módulo';
        document.getElementById('formModulo').reset();
        document.getElementById('moduloIdInput').value = '';
    }

    function cerrarModalModulo() {
        document.getElementById('modalModulo').classList.add('hidden');
    }

    function editarModulo(btn) {
        editMode = true;
        document.getElementById('modalModulo').classList.remove('hidden');
        document.getElementById('modalTitulo').textContent = 'Editar Módulo';
        
        document.getElementById('moduloIdInput').value = btn.dataset.id;
        document.getElementById('nombreInput').value = btn.dataset.nombre;
        document.getElementById('descripcionInput').value = btn.dataset.descripcion;
        document.getElementById('ordenInput').value = btn.dataset.orden;
    }

    function eliminarModulo(id) {
        if (!confirm('¿Seguro que deseas eliminar este módulo y todos sus contenidos?')) return;

        fetch('/administrador/modulos/eliminar/' + id, { method: 'DELETE' })
            .then(res => res.json())
            .then(res => {
                if (res.success) location.reload();
                else alert(res.message);
            });
    }

    document.getElementById('formModulo').addEventListener('submit', function(e) {
        e.preventDefault();
        const id = document.getElementById('moduloIdInput').value;
        const url = editMode 
            ? '/administrador/modulos/actualizar/' + id 
            : '/administrador/modulos/crear';

        const formData = new FormData(this);

        fetch(url, { method: 'POST', body: formData })
            .then(res => res.json())
            .then(res => {
                if (res.success) location.reload();
                else alert(res.message);
            });
    });
</script>



</body>
</html>

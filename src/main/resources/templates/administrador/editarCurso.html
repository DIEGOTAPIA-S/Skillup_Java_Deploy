<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Editar Curso - SKILLUP</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="flex flex-col min-h-screen bg-gradient-to-br from-blue-100 via-white to-purple-50">

<div th:replace="layouts/headerAdministrador :: header"></div>

<main class="flex-grow py-10">
    <div class="max-w-4xl w-full mx-auto px-4">

        <div class="mb-6">
            <a th:href="@{/administrador/cursos/listar}"
               class="inline-flex items-center text-purple-700 hover:text-purple-900 font-medium transition">
                ← Volver a la lista
            </a>
        </div>

        <div class="bg-white rounded-2xl shadow-2xl border border-purple-200 p-10">
            <h1 class="text-3xl font-extrabold text-purple-700 mb-6">Editar Curso</h1>

            <form th:action="@{/cursos/guardar-edicion (id=${curso.id})}" method="post">
                <input type="hidden" name="id" th:value="${curso.id}" id="cursoId">

                <div class="space-y-6">
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">Título del Curso</label>
                        <input type="text" name="nombre" th:value="${curso.nombre}" id="nombre"
                               class="w-full px-4 py-3 border-2 border-purple-200 rounded-xl focus:ring-2 focus:ring-purple-500 outline-none">
                    </div>

                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">URL de la Imagen</label>
                        <input type="text" name="imagenUrl" th:value="${curso.imagenUrl}" id="imagenUrl"
                               class="w-full px-4 py-3 border-2 border-purple-200 rounded-xl focus:ring-2 focus:ring-purple-500 outline-none">
                    </div>

                    <div class="pt-6 border-t border-gray-100 flex gap-4">
                        <button type="button" id="btnActualizar"
                                class="flex-1 bg-purple-700 hover:bg-purple-800 text-white font-bold py-3 px-6 rounded-xl transition shadow-lg">
                            💾 Guardar Cambios
                        </button>
                        <a th:href="@{/administrador/cursos/listar}"
                           class="flex-1 bg-gray-100 hover:bg-gray-200 text-gray-600 font-bold py-3 px-6 rounded-xl transition text-center">
                            Cancelar
                        </a>
                    </div>
                </div>
            </form>
        </div>
    </div>
</main>

<script>
    document.getElementById('btnActualizar').addEventListener('click', function() {
        const id = document.getElementById('cursoId').value;
        const data = {
            nombre: document.getElementById('nombre').value,
            imagenUrl: document.getElementById('imagenUrl').value,
            modulos: [] // No editamos módulos aquí por ahora para simplificar
        };

        fetch('/cursos/actualizar/' + id, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        })
        .then(res => res.json())
        .then(result => {
            if (result.success) {
                alert('Curso actualizado con éxito');
                window.location.href = '/administrador/cursos/listar';
            } else {
                alert('Error: ' + result.message);
            }
        })
        .catch(err => alert('Error de conexión'));
    });
</script>

</body>
</html>

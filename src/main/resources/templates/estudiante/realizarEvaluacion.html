<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Realizar Evaluación</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .pregunta-card {
            background: #f8f9fa;
            border-left: 4px solid #007bff;
            padding: 20px;
            margin-bottom: 25px;
            border-radius: 8px;
        }
        .opcion-radio {
            padding: 10px;
            margin: 5px 0;
            border: 2px solid #e9ecef;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .opcion-radio:hover {
            background: #e9ecef;
        }
        .opcion-radio input[type="radio"]:checked + label {
            background: #007bff;
            color: white;
        }
    </style>
</head>
<body>
<div class="container mt-5">
    <div class="row">
        <div class="col-md-10 offset-md-1">
            <div class="card shadow">
                <div class="card-header bg-primary text-white">
                    <h3 class="mb-0">
                        <i class="bi bi-file-earmark-text"></i> Evaluación Final
                    </h3>
                </div>
                <div class="card-body">
                    <div class="alert alert-info">
                        <strong>Instrucciones:</strong> Lee cuidadosamente cada pregunta y selecciona la respuesta correcta.
                        Una vez enviada la evaluación no podrás modificar tus respuestas.
                    </div>

                    <form th:action="@{/estudiante/evaluaciones/curso/{id}/enviar(id=${idCurso})}"
                          method="post"
                          id="formEvaluacion">

                        <div th:each="pregunta, iterStat : ${preguntas}" class="pregunta-card">
                            <h5 class="fw-bold mb-3">
                                <span class="badge bg-secondary">Pregunta [[${iterStat.count}]]</span>
                                [[${pregunta.pregunta}]]
                            </h5>

                            <input type="hidden" name="idPregunta" th:value="${pregunta.id}">

                            <div class="opcion-radio">
                                <input type="radio"
                                       th:id="'pregunta_' + ${pregunta.id} + '_A'"
                                       th:name="'respuesta_' + ${pregunta.id}"
                                       name="respuesta"
                                       value="A"
                                       required>
                                <label th:for="'pregunta_' + ${pregunta.id} + '_A'" class="ms-2">
                                    <strong>A)</strong> [[${pregunta.opcionA}]]
                                </label>
                            </div>

                            <div class="opcion-radio">
                                <input type="radio"
                                       th:id="'pregunta_' + ${pregunta.id} + '_B'"
                                       th:name="'respuesta_' + ${pregunta.id}"
                                       name="respuesta"
                                       value="B"
                                       required>
                                <label th:for="'pregunta_' + ${pregunta.id} + '_B'" class="ms-2">
                                    <strong>B)</strong> [[${pregunta.opcionB}]]
                                </label>
                            </div>

                            <div class="opcion-radio">
                                <input type="radio"
                                       th:id="'pregunta_' + ${pregunta.id} + '_C'"
                                       th:name="'respuesta_' + ${pregunta.id}"
                                       name="respuesta"
                                       value="C"
                                       required>
                                <label th:for="'pregunta_' + ${pregunta.id} + '_C'" class="ms-2">
                                    <strong>C)</strong> [[${pregunta.opcionC}]]
                                </label>
                            </div>

                            <div class="opcion-radio">
                                <input type="radio"
                                       th:id="'pregunta_' + ${pregunta.id} + '_D'"
                                       th:name="'respuesta_' + ${pregunta.id}"
                                       name="respuesta"
                                       value="D"
                                       required>
                                <label th:for="'pregunta_' + ${pregunta.id} + '_D'" class="ms-2">
                                    <strong>D)</strong> [[${pregunta.opcionD}]]
                                </label>
                            </div>
                        </div>

                        <div class="d-grid gap-2 mt-4">
                            <button type="submit" class="btn btn-success btn-lg" onclick="return confirm('¿Estás seguro de enviar tu evaluación?')">
                                <i class="bi bi-send"></i> Enviar Evaluación
                            </button>
                            <a th:href="@{/estudiante/cursos}" class="btn btn-secondary">
                                Cancelar
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // Prevenir envío accidental del formulario
    document.getElementById('formEvaluacion').addEventListener('submit', function(e) {
        const preguntas = document.querySelectorAll('.pregunta-card').length;
        const respuestas = document.querySelectorAll('input[type="radio"]:checked').length;

        if (respuestas < preguntas) {
            alert('Por favor responde todas las preguntas antes de enviar');
            e.preventDefault();
            return false;
        }
    });
</script>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Inscripción Exitosa</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex items-center justify-center h-screen">

<div class="bg-white shadow-md rounded-lg p-8 text-center">
    <h2 class="text-2xl font-bold text-green-600" th:text="${mensaje}">¡Inscripción realizada!</h2>

    <p class="mt-4 text-gray-700">
        Ya estás inscrito en el curso.
    </p>

    <a th:href="@{/estudiante/cursos}"
       class="mt-6 inline-block bg-blue-500 text-white px-6 py-2 rounded-lg shadow hover:bg-blue-600">
        Volver a los Cursos
    </a>
</div>

</body>
</html>

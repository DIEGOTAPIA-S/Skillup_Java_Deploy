<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Certificados - SkillUp</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-blue-100 via-white to-purple-50 min-h-screen flex flex-col">

<!-- Header -->
<div th:replace="~{layouts/headerEvaluador :: headerEvaluador}"></div>

<!-- Contenido -->
<main class="flex-grow w-full max-w-7xl mx-auto px-4 lg:px-12 py-8">

    <!-- BARRA DE ACCIONES Y FILTROS -->
    <div class="mb-8 flex flex-col md:flex-row gap-4 items-center justify-between bg-white p-6 rounded-2xl shadow-lg border border-purple-100">
        
        <!-- Botón Volver (Arriba) -->
        <a th:href="@{/evaluador/inicio}" 
           class="flex items-center gap-2 text-purple-600 hover:text-purple-800 font-bold transition">
            <span class="text-xl">←</span> Volver al Inicio
        </a>

        <!-- Formulario de Búsqueda -->
        <form th:action="@{/evaluador/listaestudiantes}" method="get" class="flex w-full md:w-auto gap-2">
            <input type="text" name="search" th:value="${search}" 
                   placeholder="Buscar por nombre o ID..." 
                   class="w-full md:w-80 px-4 py-2 rounded-xl border border-purple-200 focus:outline-none focus:ring-2 focus:ring-purple-400">
            <button type="submit" 
                    class="bg-purple-600 hover:bg-purple-700 text-white px-6 py-2 rounded-xl font-bold shadow-md transition">
                Buscar
            </button>
            <a th:href="@{/evaluador/listaestudiantes}" 
               class="bg-gray-200 hover:bg-gray-300 text-gray-700 px-4 py-2 rounded-xl font-bold transition flex items-center">
                Limpiar
            </a>
        </form>
    </div>

    <div class="overflow-hidden bg-white border border-purple-200 rounded-2xl shadow-2xl">
        <table class="w-full text-left border-collapse">
            <thead class="bg-purple-700 text-white">
            <tr>
                <th class="py-4 px-6 font-semibold">Estudiante</th>
                <th class="py-4 px-6 font-semibold">Curso</th>
                <th class="py-4 px-6 font-semibold text-center">Progreso</th>
                <th class="py-4 px-6 font-semibold text-center">Estado Certificado</th>
                <th class="py-4 px-6 font-semibold text-center">Acciones</th>
            </tr>
            </thead>
            <tbody class="divide-y divide-purple-100">
            <tr th:each="d : ${datos}" class="hover:bg-purple-50 transition-colors">
                <td class="py-4 px-6">
                    <div class="font-bold text-gray-800" th:text="${d.inscripcion.usuario.nombre} + ' ' + ${d.inscripcion.usuario.apellido1}"></div>
                    <div class="text-xs text-gray-500" th:text="${d.inscripcion.usuario.correo}"></div>
                </td>
                <td class="py-4 px-6 text-gray-700 font-medium" th:text="${d.inscripcion.curso.nombre}"></td>
                <td class="py-4 px-6 text-center">
                    <span th:if="${d.modulosTerminados}" class="bg-green-100 text-green-800 px-3 py-1 rounded-full text-xs font-bold ring-1 ring-green-600">
                        100% COMPLETADO
                    </span>
                    <span th:unless="${d.modulosTerminados}" class="bg-yellow-100 text-yellow-800 px-3 py-1 rounded-full text-xs font-bold ring-1 ring-yellow-600">
                        EN CURSO
                    </span>
                </td>
                <td class="py-4 px-6 text-center">
                    <span th:text="${d.estadoLabel}" 
                          th:class="${d.estadoLabel == 'Certificado Generado' ? 'text-green-600 font-bold' : (d.estadoLabel == 'Pendiente Revisión' ? 'text-blue-600' : 'text-gray-400')}">
                    </span>
                </td>
                <td class="py-4 px-6 text-center">
                    <form th:if="${d.estadoLabel == 'Sin Certificado' or d.estadoLabel == 'Pendiente Revisión'}" 
                          th:action="@{/evaluador/aprobar/{id}(id=${d.inscripcion.id})}" method="post">
                        <button type="submit" 
                                class="bg-purple-600 hover:bg-purple-800 text-white font-bold py-2 px-6 rounded-lg shadow-md transition transform hover:scale-105">
                            Aprobar Certificado
                        </button>
                    </form>
                    <span th:if="${d.estadoLabel == 'Certificado Generado'}" class="text-green-500 text-2xl">
                        ✅
                    </span>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(datos)}">
                <td colspan="5" class="py-10 text-center text-gray-500 italic">
                    No hay inscripciones registradas actualmente.
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <!-- Botón Volver -->
    <div class="mt-10 text-center">
        <a th:href="@{/evaluador/inicio}" 
           class="inline-block bg-gray-600 hover:bg-gray-700 text-white font-bold py-3 px-10 rounded-xl shadow-lg transition">
            ← Volver al Inicio
        </a>
    </div>

</main>

</body>
</html>

<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Registrar Evaluación - SkillUp</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        function agregarPregunta() {
            const container = document.getElementById("preguntas-container");
            const index = container.children.length;
            const template = `
                <div class="mb-6 border p-4 rounded-lg bg-purple-50">
                    <label class="block font-bold mb-2">Pregunta ${index + 1}</label>
                    <input name="preguntas[${index}].pregunta" placeholder="Texto de la pregunta"
                        class="w-full mb-2 p-2 border rounded" required />
                    <input name="preguntas[${index}].opcionA" placeholder="Opción A"
                        class="w-full mb-2 p-2 border rounded" required />
                    <input name="preguntas[${index}].opcionB" placeholder="Opción B"
                        class="w-full mb-2 p-2 border rounded" required />
                    <input name="preguntas[${index}].opcionC" placeholder="Opción C"
                        class="w-full mb-2 p-2 border rounded" required />
                    <input name="preguntas[${index}].opcionD" placeholder="Opción D"
                        class="w-full mb-2 p-2 border rounded" required />
                    <label class="block mb-2">Respuesta correcta:</label>
                    <select name="preguntas[${index}].respuestaCorrecta" class="p-2 border rounded" required>
                        <option value="">Selecciona</option>
                        <option value="A">A</option>
                        <option value="B">B</option>
                        <option value="C">C</option>
                        <option value="D">D</option>
                    </select>
                </div>`;
            container.insertAdjacentHTML('beforeend', template);
        }
    </script>
</head>
<body class="flex flex-col min-h-screen">

<!-- Header fijo arriba -->
<header class="w-full bg-purple-700 text-white">
    <div th:replace="layouts/headerEvaluador :: headerEvaluador"></div>
</header>

<!-- Contenido principal: ocupa todo el espacio restante -->
<main class="flex-grow bg-gradient-to-br from-blue-100 via-white to-purple-50 p-10">
    <div class="max-w-4xl mx-auto bg-white p-8 rounded-2xl shadow-lg">

        <h1 class="text-3xl font-bold mb-6 text-purple-700 text-center">Registrar Evaluación</h1>

        <form th:action="@{/evaluador/crearEvaluacion}" method="post">

            <label class="block font-bold mb-2">Seleccionar Curso:</label>
            <select name="idCurso" class="w-full mb-4 p-2 border rounded" required>
                <option value="">--Selecciona un curso--</option>
                <option th:each="curso : ${cursos}"
                        th:value="${curso.id}"
                        th:text="${curso.nombre}"></option>
            </select>

            <label class="block font-bold mb-2">Comentarios:</label>
            <textarea name="comentarios" class="w-full mb-4 p-2 border rounded" rows="3"></textarea>

            <h2 class="text-xl font-bold mb-2">Preguntas:</h2>
            <div id="preguntas-container"></div>

            <button type="button" onclick="agregarPregunta()"
                    class="mb-4 bg-purple-500 hover:bg-purple-700 text-white px-4 py-2 rounded">
                + Agregar Pregunta
            </button>

            <button type="submit"
                    class="bg-green-500 hover:bg-green-700 text-white px-6 py-2 rounded">
                Crear Evaluación
            </button>
        </form>
    </div>
</main>

<!-- Footer fijo abajo -->
<footer class="w-full bg-purple-700 text-white mt-auto">
    <div th:replace="layouts/footer :: footer"></div>
</footer>

</body>
</html>

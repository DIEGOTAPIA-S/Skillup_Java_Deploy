<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Mis Evaluaciones</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="flex flex-col min-h-screen">

<!-- Header fijo arriba -->
<header class="w-full bg-purple-700 text-white">
    <div th:replace="~{layouts/headerEvaluador :: headerEvaluador}"></div>
</header>

<!-- Contenido principal -->
<main class="flex-grow bg-gray-100 p-8 overflow-auto">
    <div class="max-w-6xl mx-auto">

        <h1 class="text-3xl font-bold mb-6 text-purple-700 text-center">Mis Evaluaciones</h1>

        <table class="min-w-full bg-white shadow-md rounded-lg">
            <thead>
            <tr>
                <th class="px-4 py-2">ID</th>
                <th class="px-4 py-2">Curso</th>
                <th class="px-4 py-2">Pregunta</th>
                <th class="px-4 py-2">Respuesta Correcta</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="pregunta : ${preguntas}">
                <td class="border px-4 py-2" th:text="${pregunta.id}"></td>
                <td class="border px-4 py-2" th:text="${pregunta.curso?.nombre ?: 'N/A'}"></td>
                <td class="border px-4 py-2" th:text="${pregunta.pregunta}"></td>
                <td class="border px-4 py-2" th:text="${pregunta.respuestaCorrecta}"></td>
            </tr>
            </tbody>
        </table>

        <div class="mt-8 flex gap-4">
            <a th:href="@{/evaluador/formularioevaluacion}"
               class="bg-purple-600 hover:bg-purple-700 text-white px-6 py-3 rounded-xl font-bold shadow-md transition">
                ➕ Crear Nueva Evaluación
            </a>
            <a th:href="@{/evaluador/inicio}" 
               class="bg-gray-200 hover:bg-gray-300 text-gray-700 px-6 py-3 rounded-xl font-bold transition">
                ← Volver al Inicio
            </a>
        </div>

    </div>
</main>



</body>
</html>

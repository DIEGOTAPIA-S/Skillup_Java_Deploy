<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Inicio de Sesión | SkillUp</title>

    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen flex items-center justify-center py-10">

<!-- CONTENEDOR PRINCIPAL -->
<div class="w-full max-w-2xl bg-white p-10 rounded-3xl shadow-2xl border border-purple-200 relative">

    <!-- BOTÓN VOLVER -->
    <a th:href="@{home}"
       class="absolute top-4 left-4 bg-white border border-gray-300 text-gray-700
              px-3 py-1 rounded-lg shadow hover:bg-gray-100 transition flex items-center gap-2">
        <span class="text-lg">←</span> Volver
    </a>

    <!-- LOGO -->
    <div class="text-center mb-6">
        <img th:src="@{/images/LogoSkillup.png}" alt="SkillUp Logo" class="w-28 mx-auto mb-3"/>

        <h2 class="text-3xl font-extrabold text-purple-700 mb-2">¡Bienvenido de nuevo!</h2>

        <p class="text-gray-600 text-lg">
            Accede a tu cuenta y continúa aprendiendo.
        </p>
    </div>

    <!-- ERROR -->
    <div th:if="${param.error}"
         class="mb-4 p-3 rounded bg-red-100 text-red-700 border border-red-300 text-center">
        Credenciales incorrectas. Intente nuevamente.
    </div>

    <!-- LOGOUT -->
    <div th:if="${param.logout}"
         class="mb-4 p-3 rounded bg-green-100 text-green-700 border border-green-300 text-center">
        Sesión cerrada correctamente.
    </div>

    <!-- MENSAJE DE ÉXITO REGISTRO -->
    <div th:if="${param.exito}"
         class="mb-4 p-3 rounded bg-green-100 text-green-700 border border-green-300 text-center">
        <span>¡Cuenta creada con éxito! Ya puedes iniciar sesión.</span>
    </div>

    <div th:if="${mensaje}"
         class="mb-4 p-3 rounded bg-green-100 text-green-700 border border-green-300 text-center">
        <span th:text="${mensaje}"></span>
    </div>

    <!-- FORMULARIO -->
    <form method="post" th:action="@{/login/acceder}" class="space-y-5" novalidate>

        <!-- Usuario -->
        <div>
            <label for="usuario" class="block text-gray-700 font-semibold mb-1">Correo electrónico</label>
            <input
                    type="text"
                    id="usuario"
                    name="usuario"
                    required
                    placeholder="Ingrese su correo"
                    class="w-full border border-gray-300 p-3 rounded-lg
                           focus:outline-none focus:ring-2 focus:ring-purple-500 bg-gray-50"/>
        </div>

        <!-- Contraseña -->
        <div>
            <label for="password" class="block text-gray-700 font-semibold mb-1">Contraseña</label>
            <div class="relative">
                <input
                        type="password"
                        id="password"
                        name="password"
                        required
                        placeholder="Ingrese su contraseña"
                        class="w-full border border-gray-300 p-3 pr-12 rounded-lg
                               focus:outline-none focus:ring-2 focus:ring-purple-500 bg-gray-50"/>
                <button type="button" id="togglePassword"
                        class="absolute right-3 top-3 text-sm text-purple-600 hover:text-purple-800">
                    Mostrar
                </button>
            </div>
        </div>

        <!-- Recordarme + Olvido contraseña -->
        <div class="flex justify-between text-sm text-gray-600">
            <label><input type="checkbox" name="remember" class="mr-1"> Recordarme</label>
            <a href="#" class="text-purple-600 hover:underline">Olvidé mi contraseña</a>
        </div>

        <!-- Botón -->
        <button type="submit"
                class="w-full bg-purple-600 hover:bg-purple-700 text-white font-bold
                       py-3 rounded-lg shadow transition transform hover:scale-[1.02]">
            Ingresar
        </button>

        <p class="text-center text-gray-600 text-sm mt-4">
            ¿No tienes cuenta?
            <a th:href="@{/registro}" class="text-purple-600 hover:underline font-semibold">
                ¡Crea una!
            </a>
        </p>
    </form>
</div>

<!-- SCRIPT mostrar contraseña -->
<script>
    const togglePassword = document.getElementById('togglePassword');
    const passwordInput = document.getElementById('password');

    togglePassword.addEventListener('click', () => {
        const visible = passwordInput.type === 'password';
        passwordInput.type = visible ? 'text' : 'password';
        togglePassword.textContent = visible ? 'Ocultar' : 'Mostrar';
    });
</script>

</body>
</html>

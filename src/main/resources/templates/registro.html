<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Registro - SkillUp</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-blue-100 via-white to-purple-100 min-h-screen flex items-center justify-center py-12">

<div class="w-full max-w-3xl bg-white p-10 rounded-3xl shadow-2xl relative border border-purple-200">

    <!-- Botón Volver -->
    <a th:href="@{home}"
       class="absolute top-4 left-4 bg-white border border-gray-300 text-gray-700
          px-4 py-2 rounded-lg shadow hover:bg-gray-100 hover:shadow-lg
          transition flex items-center gap-2">

        <span class="text-xl">←</span>
        <span class="font-semibold">Volver</span>
    </a>


    <!-- Sección de bienvenida -->
    <div class="text-center mb-8">
        <!-- Imagen de tu preferencia -->
        <img
                th:src="@{/images/LogoSkillup.png}"
                alt="Bienvenido a SkillUp"
                class="mx-auto w-32 h-32 object-contain mb-4"
        />


        <h1 class="text-4xl font-extrabold text-purple-700 mb-2">
            ¡Bienvenido a SkillUp! (v1.6)
        </h1>

        <p class="text-gray-600 text-lg max-w-xl mx-auto">
            Desarrolla tu potencial, aprende nuevas habilidades y accede a tus cursos en solo unos segundos.
            Completa el formulario para crear tu cuenta.
        </p>
    </div>

    <!-- Título del formulario -->
    <h2 class="text-2xl font-bold text-gray-800 mb-6 text-center">Crear cuenta</h2>

    <!-- Mensajes -->
    <div th:if="${mensaje}" class="mb-4 p-4 bg-green-100 border border-green-400 text-green-700 rounded">
        <p th:text="${mensaje}"></p>
    </div>

    <div th:if="${errores}" class="mb-4 p-4 bg-red-100 border border-red-400 text-red-700 rounded">
        <ul class="list-disc list-inside space-y-1">
            <li th:each="error : ${errores}" th:text="${error}"></li>
        </ul>
    </div>

    <!-- Formulario -->
    <form th:object="${registroDTO}" th:action="@{/registro/guardar}" method="post" novalidate>

        <!-- Identificación -->
        <div class="mb-4">
            <label class="block text-gray-700 font-semibold mb-2">
                Identificación <span class="text-red-500">*</span>
            </label>
            <input
                    th:field="*{identificacion}"
                    type="text"
                    placeholder="Ej: 1234567890"
                    pattern="^\d{6,15}$"
                    maxlength="15"
                    class="w-full p-3 rounded-xl bg-gray-50 border border-gray-300
               focus:outline-none focus:ring-2 focus:ring-blue-600 focus:border-blue-600
               shadow-sm hover:bg-gray-100 transition"
                    required>
        </div>

        <!-- Nombre -->
        <div class="mb-4">
            <label class="block text-gray-700 font-semibold mb-2">
                Nombre <span class="text-red-500">*</span>
            </label>
            <input
                    th:field="*{nombre}"
                    type="text"
                    placeholder="Ej: Juan"
                    pattern="^[A-Za-zÁÉÍÓÚáéíóúÑñ\s]+$"
                    class="w-full p-3 rounded-xl bg-gray-50 border border-gray-300
               focus:outline-none focus:ring-2 focus:ring-blue-600 focus:border-blue-600
               shadow-sm hover:bg-gray-100 transition"
                    required>
        </div>

        <!-- Primer Apellido -->
        <div class="mb-4">
            <label class="block text-gray-700 font-semibold mb-2">
                Primer apellido <span class="text-red-500">*</span>
            </label>
            <input
                    th:field="*{apellido1}"
                    type="text"
                    placeholder="Ej: Pérez"
                    pattern="^[A-Za-zÁÉÍÓÚáéíóúÑñ\s]+$"
                    class="w-full p-3 rounded-xl bg-gray-50 border border-gray-300
               focus:outline-none focus:ring-2 focus:ring-blue-600 focus:border-blue-600
               shadow-sm hover:bg-gray-100 transition"
                    required>
        </div>

        <!-- Segundo Apellido -->
        <div class="mb-4">
            <label class="block text-gray-700 font-semibold mb-2">
                Segundo apellido <span class="text-gray-400">(Opcional)</span>
            </label>
            <input
                    th:field="*{apellido2}"
                    type="text"
                    placeholder="Ej: García"
                    pattern="^[A-Za-zÁÉÍÓÚáéíóúÑñ\s]*$"
                    class="w-full p-3 rounded-xl bg-gray-50 border border-gray-300
               focus:outline-none focus:ring-2 focus:ring-blue-600 focus:border-blue-600
               shadow-sm hover:bg-gray-100 transition">
        </div>

        <!-- Correo -->
        <div class="mb-4">
            <label class="block text-gray-700 font-semibold mb-2">
                Correo electrónico <span class="text-red-500">*</span>
            </label>
            <input
                    th:field="*{correo}"
                    type="email"
                    placeholder="ejemplo@gmail.com"
                    class="w-full p-3 rounded-xl bg-gray-50 border border-gray-300
               focus:outline-none focus:ring-2 focus:ring-blue-600 focus:border-blue-600
               shadow-sm hover:bg-gray-100 transition"
                    required>
        </div>

        <!-- Contraseña -->
        <div class="mb-4">
            <label class="block text-gray-700 font-semibold mb-2">
                Contraseña <span class="text-red-500">*</span>
            </label>
            <input
                    th:field="*{contraseña}"
                    type="password"
                    placeholder="••••••••"
                    pattern="^(?=.*[a-z])(?=.*[A-Z])(?=.*\d).{8,}$"
                    minlength="8"
                    class="w-full p-3 rounded-xl bg-gray-50 border border-gray-300
               focus:outline-none focus:ring-2 focus:ring-blue-600 focus:border-blue-600
               shadow-sm hover:bg-gray-100 transition"
                    required>
        </div>

        <!-- Confirmar contraseña -->
        <div class="mb-6">
            <label class="block text-gray-700 font-semibold mb-2">
                Confirmar contraseña <span class="text-red-500">*</span>
            </label>
            <input
                    th:field="*{confirmarContraseña}"
                    type="password"
                    placeholder="••••••••"
                    minlength="8"
                    class="w-full p-3 rounded-xl bg-gray-50 border border-gray-300
               focus:outline-none focus:ring-2 focus:ring-blue-600 focus:border-blue-600
               shadow-sm hover:bg-gray-100 transition"
                    required>
            <p id="passwordMatchMessage" class="text-xs mt-1 hidden"></p>
        </div>


        <!-- Botón -->
        <button type="submit"
                class="w-full bg-purple-600 hover:bg-purple-700 text-white font-bold p-3 rounded-xl shadow-lg transition transform hover:scale-105">
            Crear cuenta
        </button>

        <!-- Link a login -->
        <p class="text-center mt-4 text-gray-600">
            ¿Ya tienes una cuenta?
            <a th:href="@{/login}" class="text-purple-600 hover:text-purple-800 font-semibold">Inicia sesión aquí</a>
        </p>
    </form>
</div>

<!-- Estilos reutilizables -->
<style>
    .input-field {
        @apply w-full border border-gray-300 p-3 rounded-lg focus:outline-none
        focus:ring-2 focus:ring-purple-500 transition;
    }
</style>

</body>
</html>

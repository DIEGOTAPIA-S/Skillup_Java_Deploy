<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Olvidé mi contraseña - SkillUp</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen">
    <div class="max-w-md w-full bg-white rounded-xl shadow-lg p-8 mx-4">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold text-gray-900">¿Olvidaste tu contraseña?</h1>
            <p class="text-gray-600 mt-2">Ingresa tu correo electrónico y te enviaremos un enlace para restablecerla.</p>
        </div>

        <!-- Mensajes de éxito/error -->
        <div th:if="${message}" class="mb-4 p-4 bg-green-50 border-l-4 border-green-500 text-green-700">
            <p th:text="${message}"></p>
        </div>
        <div th:if="${error}" class="mb-4 p-4 bg-red-50 border-l-4 border-red-500 text-red-700">
            <p th:text="${error}"></p>
        </div>

        <form th:action="@{/forgot-password}" method="post" class="space-y-6">
            <div>
                <label for="correo" class="block text-sm font-medium text-gray-700">Correo Electrónico</label>
                <input type="email" id="correo" name="correo" required
                    class="mt-1 block w-full px-4 py-3 bg-gray-50 border border-gray-300 rounded-lg focus:ring-purple-500 focus:border-purple-500 transition duration-150">
            </div>

            <button type="submit"
                class="w-full flex justify-center py-3 px-4 border border-transparent rounded-lg shadow-sm text-sm font-semibold text-white bg-purple-600 hover:bg-purple-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-purple-500 transition duration-150">
                Enviar enlace de recuperación
            </button>
        </form>

        <div class="mt-8 text-center">
            <a th:href="@{/login}" class="text-sm font-medium text-purple-600 hover:text-purple-500 transition duration-150">
                &larr; Volver al inicio de sesión
            </a>
        </div>
    </div>
</body>
</html>

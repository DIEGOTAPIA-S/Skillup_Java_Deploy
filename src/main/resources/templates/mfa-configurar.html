<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Configurar MFA | SkillUp</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center py-10">
    <div class="w-full max-w-md bg-white p-8 rounded-3xl shadow-2xl border border-purple-200 text-center">
        <h2 class="text-2xl font-extrabold text-purple-700 mb-4">Protege tu cuenta</h2>
        <p class="text-gray-600 mb-6 text-sm">Escanea este código con la aplicación <b>Google Authenticator</b> o Microsoft Authenticator.</p>
        
        <div class="flex justify-center mb-6 bg-gray-50 p-4 rounded-xl border border-dashed border-purple-300">
            <img th:src="${qrUri}" alt="Código QR MFA" class="w-48 h-48"/>
        </div>

        <p class="text-xs text-gray-500 mb-6">Si no puedes escanear el código, usa esta clave manual: <br>
           <span class="font-mono font-bold text-purple-600" th:text="${secret}"></span>
        </p>

        <a th:href="@{/mfa/verificar}" 
           class="inline-block w-full bg-purple-600 hover:bg-purple-700 text-white font-bold py-3 rounded-lg shadow transition">
            Ya lo escaneé, continuar
        </a>
    </div>
</body>
</html>
